<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>封装流程 · 手绘</title>
<style>
  body{ margin:0; background:#f5f0e8; display:flex; justify-content:center; min-height:100vh; }
  .container{ max-width:580px; width:100%; padding:16px; }
  h1{ text-align:center; font-size:22px; color:#2c2c2c; margin:0 0 2px; font-family:'PingFang SC','Microsoft YaHei',sans-serif; letter-spacing:2px; }
  .sub{ text-align:center; font-size:11px; color:#8b7b6f; margin-bottom:10px; }
  canvas{ width:100%; display:block; border-radius:4px; }
</style>
</head>
<body>
<div class="container">
  <h1>芯片封装工艺流程图</h1>
  <p class="sub">Semiconductor Packaging Process</p>
  <canvas id="c"></canvas>
</div>
<script>
(function(){
  const c=document.getElementById('c'),W=520,H=860,dpr=window.devicePixelRatio||1;
  c.width=W*dpr;c.height=H*dpr;c.style.width=W+'px';c.style.height=H+'px';
  const ctx=c.getContext('2d');ctx.scale(dpr,dpr);
  ctx.fillStyle='#f5f0e8';ctx.fillRect(0,0,W,H);

  ctx.strokeStyle='rgba(160,140,120,0.05)';ctx.lineWidth=0.5;
  for(let y=30;y<H;y+=20){ctx.beginPath();ctx.moveTo(15,y);ctx.lineTo(W-15,y);ctx.stroke();}

  function R(n){return(Math.random()-0.5)*n}

  function sketchLine(x1,y1,x2,y2,o){
    for(let d=0;d<2;d++){
      ctx.strokeStyle=d===0?o.c||'#333':'rgba(50,50,50,0.25)';
      ctx.lineWidth=d===0?(o.w||1.5):(o.w||1.5)*0.5;
      ctx.beginPath();
      const n=5;
      for(let i=0;i<=n;i++){
        const t=i/n,w=(i>0&&i<n)?R(o.r||1.8):0;
        i===0?ctx.moveTo(x1+(x2-x1)*t+w+R(d),y1+(y2-y1)*t+w+R(d)):ctx.lineTo(x1+(x2-x1)*t+w+R(d),y1+(y2-y1)*t+w+R(d));
      }
      ctx.stroke();
    }
  }

  function sketchRect(x,y,w,h,o){
    sketchLine(x+2,y+2,x+w+2,y+2,{c:'rgba(0,0,0,0.04)',w:1,r:1});
    sketchLine(x+w+2,y+2,x+w+2,y+h+2,{c:'rgba(0,0,0,0.04)',w:1,r:1});
    sketchLine(x+w+2,y+h+2,x+2,y+h+2,{c:'rgba(0,0,0,0.04)',w:1,r:1});
    sketchLine(x+2,y+h+2,x+2,y+2,{c:'rgba(0,0,0,0.04)',w:1,r:1});
    sketchLine(x,y,x+w,y,o);sketchLine(x+w,y,x+w,y+h,o);
    sketchLine(x+w,y+h,x,y+h,o);sketchLine(x,y+h,x,y,o);
    if(o.fill){ctx.fillStyle=o.fill;ctx.fillRect(x+2,y+2,w-4,h-4);}
  }

  function sketchCircle(cx,cy,r2,o){
    for(let d=0;d<2;d++){
      ctx.strokeStyle=d===0?o.c||'#333':'rgba(50,50,50,0.25)';
      ctx.lineWidth=d===0?(o.w||1.5):(o.w||1.5)*0.6;
      ctx.beginPath();
      const n=16+Math.random()*4;
      for(let i=0;i<=n;i++){const a=Math.PI*2*i/n,rr=r2+R(o.r||2);
        i===0?ctx.moveTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr):ctx.lineTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr);}
      ctx.closePath();ctx.stroke();
    }
    if(o.fill){ctx.fillStyle=o.fill;
      ctx.beginPath();for(let i=0;i<=n;i++){const a=Math.PI*2*i/n,rr=r2+R(1);
        i===0?ctx.moveTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr):ctx.lineTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr);}
      ctx.closePath();ctx.fill();}
  }

  function txt(s,x,y,o){
    ctx.fillStyle=o.c||'#222';
    ctx.font=(o.b?'bold ':'')+(o.sz||13)+'px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign=o.al||'center';ctx.textBaseline=o.bl||'middle';
    ctx.fillText(s,x+R(0.5),y+R(0.5));
  }

  const cx=W/2,bw=300,bh=60,gap=88,sy=70;
  const steps=[
    {n:'①',cn:'晶圆切割',en:'Wafer Dicing',desc:'将晶圆切割成独立芯片单元'},
    {n:'②',cn:'芯片贴装',en:'Die Attach',desc:'芯片精确粘贴到引线框架'},
    {n:'③',cn:'引线键合',en:'Wire Bonding',desc:'金属引线连接焊盘与引脚'},
    {n:'④',cn:'塑封',en:'Molding',desc:'环氧树脂封装保护芯片'},
    {n:'⑤',cn:'打标',en:'Marking',desc:'激光刻印产品标识信息'},
    {n:'⑥',cn:'切割成型',en:'Singulation',desc:'从框架分离为独立封装体'},
    {n:'⑦',cn:'测试分选',en:'Testing & Sorting',desc:'电性能测试并分档包装出货'},
  ];

  steps.forEach((s,i)=>{
    const y=sy+i*gap,x=cx-bw/2;
    sketchRect(x,y,bw,bh,{c:'#4a3a2e',w:1.8,fill:'#ffffff',r:2.5});
    sketchCircle(x+30,y+bh/2,16,{c:'#2c2c2c',w:1.8,fill:'#2c2c2c',r:1.8});
    txt(s.n,x+30,y+bh/2,{c:'#fff',sz:14,b:true});
    txt(s.cn,x+54,y+bh/2-8,{c:'#222',sz:15,b:true,al:'left'});
    txt(s.en,x+54,y+bh/2+7,{c:'#6b5b4f',sz:11,al:'left'});
    txt(s.desc,x+54,y+bh/2+23,{c:'#8b7b6f',sz:11,al:'left'});

    if(i<steps.length-1){
      const y1=y+bh+2,y2=y+gap-6;
      for(let d=0;d<2;d++){
        ctx.strokeStyle=d===0?'#4a3a2e':'rgba(50,50,50,0.25)';
        ctx.lineWidth=d===0?1.8:0.8;
        ctx.beginPath();
        const n=8;
        for(let j=0;j<=n;j++){const t=j/n,wy=y1+(y2-y1)*t,w=(j>0&&j<n)?R(1.5+R(d)):0;
          j===0?ctx.moveTo(cx+w+R(d),wy+R(d)):ctx.lineTo(cx+w+R(d),wy+R(d));}
        ctx.stroke();
      }
      ctx.fillStyle='#4a3a2e';
      ctx.beginPath();ctx.moveTo(cx-5,y2-6);ctx.lineTo(cx,y2);ctx.lineTo(cx+5,y2-6);ctx.closePath();ctx.fill();
    }
  });

  ctx.strokeStyle='rgba(74,58,46,0.1)';ctx.lineWidth=1;
  [[10,10,20],[W-10,10,-20],[10,H-10,20],[W-10,H-10,-20]].forEach(([x,y,s])=>{
    ctx.beginPath();for(let i=0;i<4;i++)ctx.lineTo(x+R(s),y+R(s/3));ctx.stroke();
  });
})();
</script>
</body>
</html>
