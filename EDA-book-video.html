<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDA封装验证实战 · 宣传视频</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#070c17;display:flex;justify-content:center;align-items:center;
    min-height:100vh;font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',Arial,sans-serif;
    overflow:hidden;user-select:none;
  }
  .player{
    width:100%;max-width:1200px;aspect-ratio:16/9;
    position:relative;overflow:hidden;
    background:radial-gradient(ellipse at 30% 20%,#0e1a30 0%,#070c17 70%);
    box-shadow:0 0 80px rgba(30,80,180,0.08);
  }
  .slides{position:relative;width:100%;height:100%;overflow:hidden}
  .slide{
    position:absolute;inset:0;
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    padding:5%;opacity:0;pointer-events:none;
    transition:opacity 0.8s ease,transform 0.8s ease;
    transform:scale(0.97);
  }
  .slide.active{opacity:1;pointer-events:auto;transform:scale(1);z-index:2}
  .slide.exit{opacity:0;transform:scale(1.03);z-index:1}
  .hud{
    position:absolute;bottom:0;left:0;right:0;z-index:10;
    padding:14px 28px 18px;
    background:linear-gradient(transparent,rgba(7,12,23,0.95));
  }
  .progress-track{height:2px;background:rgba(255,255,255,0.1);border-radius:1px;margin-bottom:10px;cursor:pointer}
  .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#4a9eff,#22c55e);border-radius:1px;transition:width 0.3s linear}
  .hud-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:rgba(255,255,255,0.4)}
  .hud-part{display:flex;gap:12px;align-items:center}
  .hud-part .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.15);transition:all 0.3s}
  .hud-part .dot.done{background:#4a9eff;box-shadow:0 0 6px rgba(74,158,255,0.4)}
  .hud-part .dot.active{background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,0.5)}
  .hud-btns{display:flex;gap:12px}
  .hud-btns button{
    background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;
    font-size:13px;padding:2px 6px;transition:color 0.2s;
  }
  .hud-btns button:hover{color:rgba(255,255,255,0.7)}
  .part-label{
    position:absolute;top:20px;left:28px;z-index:5;
    font-size:11px;letter-spacing:2px;text-transform:uppercase;
    color:rgba(255,255,255,0.2);font-weight:500;
  }
  .slide h1{
    font-size:clamp(28px,5vw,52px);font-weight:700;color:#fff;
    letter-spacing:2px;line-height:1.3;text-align:center;
  }
  .slide h1 .accent{background:linear-gradient(135deg,#4a9eff,#22c55e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .slide h2{
    font-size:clamp(20px,3.2vw,36px);font-weight:600;color:#fff;
    letter-spacing:1px;text-align:center;
  }
  .slide .sub{
    font-size:clamp(13px,1.6vw,20px);color:rgba(255,255,255,0.5);margin-top:10px;
    letter-spacing:1px;text-align:center;
  }
  .slide .sub2{
    font-size:clamp(11px,1.2vw,15px);color:rgba(255,255,255,0.35);margin-top:4px;text-align:center;
  }
  .slide .tagline{
    font-size:clamp(12px,1.3vw,16px);color:rgba(255,255,255,0.4);margin-top:20px;
    font-style:italic;text-align:center;max-width:70%;
  }
  .module-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:24px;width:85%;max-width:800px;
  }
  .module-grid .mod{
    background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
    border-radius:8px;padding:12px 14px;text-align:center;
    transition:all 0.3s;
  }
  .module-grid .mod .mn{font-size:clamp(11px,1.1vw,14px);font-weight:600;color:#fff}
  .module-grid .mod .md{font-size:clamp(9px,0.9vw,11px);color:rgba(255,255,255,0.35);margin-top:2px}
  .method-flow{
    display:flex;align-items:center;gap:12px;margin-top:28px;
    flex-wrap:wrap;justify-content:center;
  }
  .method-flow .step-box{
    background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
    border-radius:10px;padding:14px 20px;text-align:center;min-width:120px;
  }
  .method-flow .step-box .sn{font-size:10px;color:rgba(255,255,255,0.25);letter-spacing:1px;margin-bottom:4px}
  .method-flow .step-box .sc{font-size:clamp(13px,1.3vw,17px);color:#fff;font-weight:500}
  .method-flow .arrow{font-size:22px;color:rgba(255,255,255,0.2)}
  .struct-grid{
    display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:22px;width:90%;max-width:780px;
  }
  .struct-grid .sg{
    background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
    border-radius:6px;padding:10px 14px;text-align:center;flex:1;min-width:100px;
  }
  .struct-grid .sg .sn{font-size:clamp(10px,0.9vw,12px);color:rgba(255,255,255,0.25);letter-spacing:1px;margin-bottom:2px}
  .struct-grid .sg .st{font-size:clamp(12px,1.1vw,14px);color:#fff;font-weight:500}
  .struct-grid .sg .sc{font-size:clamp(9px,0.8vw,11px);color:rgba(255,255,255,0.3);margin-top:2px}
  .struct-grid .sg.highlight{border-color:#22c55e;background:rgba(34,197,94,0.06)}
  .struct-grid .sg.active{border-color:#4a9eff;background:rgba(74,158,255,0.08)}
  .canvas-wrap{width:100%;height:78%;display:flex;justify-content:center;align-items:center}
  .canvas-wrap canvas{width:100%;height:100%;border-radius:6px}
  .tool-flow{
    display:flex;align-items:center;gap:6px;margin-top:20px;
    flex-wrap:wrap;justify-content:center;max-width:90%;
  }
  .tool-flow .tool{
    background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
    border-radius:8px;padding:8px 14px;text-align:center;min-width:70px;
  }
  .tool-flow .tool .tn{font-size:clamp(10px,1vw,13px);font-weight:600;color:#fff}
  .tool-flow .tool .td{font-size:clamp(8px,0.7vw,10px);color:rgba(255,255,255,0.3);margin-top:1px}
  .tool-flow .tool.design{border-color:#4a9eff;background:rgba(74,158,255,0.1)}
  .tool-flow .tool.verify{border-color:#f0b429;background:rgba(240,180,41,0.08)}
  .tool-flow .tool.sim{border-color:#22c55e;background:rgba(34,197,94,0.08)}
  .tool-flow .tool.co{border-color:#a855f7;background:rgba(168,85,247,0.08)}
  .tool-flow .arrow-sm{font-size:16px;color:rgba(255,255,255,0.15)}
  .chapter-sections{
    display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:18px;width:88%;max-width:720px;
  }
  .chapter-sections .sec{
    background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
    border-radius:6px;padding:8px 12px;text-align:center;flex:1;min-width:120px;
  }
  .chapter-sections .sec .sn{font-size:clamp(10px,0.9vw,12px);color:rgba(255,255,255,0.25)}
  .chapter-sections .sec .st{font-size:clamp(12px,1.1vw,14px);color:#fff;font-weight:500;margin-top:1px}
  .cmp-table{
    display:grid;grid-template-columns:1fr 1.5fr 1.5fr;gap:1px;margin-top:16px;width:92%;max-width:760px;
    background:rgba(255,255,255,0.06);border-radius:6px;overflow:hidden;
  }
  .cmp-table .cell{padding:8px 12px;background:rgba(255,255,255,0.04);font-size:clamp(10px,1vw,13px);color:rgba(255,255,255,0.6)}
  .cmp-table .cell.h{font-weight:600;color:#fff;background:rgba(255,255,255,0.06)}
  .cmp-table .cell.accent{color:#4a9eff}
  .cmp-table .cell.green{color:#22c55e}
  .summary-items{display:flex;flex-direction:column;gap:10px;margin-top:20px;width:80%;max-width:600px}
  .summary-items .si{
    display:flex;align-items:center;gap:12px;
    background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
    border-radius:8px;padding:12px 16px;
  }
  .summary-items .si .icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
  .summary-items .si .text{font-size:clamp(12px,1.1vw,15px);color:rgba(255,255,255,0.7)}
  .fade-up{animation:fadeUp 0.6s ease forwards;opacity:0}
  .fade-in{animation:fadeIn 0.5s ease forwards;opacity:0}
  .slide.active .d1{animation-delay:0.1s}.slide.active .d2{animation-delay:0.2s}
  .slide.active .d3{animation-delay:0.3s}.slide.active .d4{animation-delay:0.4s}
  .slide.active .d5{animation-delay:0.5s}.slide.active .d6{animation-delay:0.6s}
  .slide.active .d7{animation-delay:0.7s}.slide.active .d8{animation-delay:0.8s}
  .slide.active .d9{animation-delay:0.9s}.slide.active .d10{animation-delay:1.0s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .glow-line{width:60px;height:2px;background:linear-gradient(90deg,#4a9eff,#22c55e);border-radius:1px;margin:16px auto 0}
  @media(max-width:768px){
    .module-grid{grid-template-columns:repeat(2,1fr);gap:6px;width:95%}
    .method-flow{gap:6px}.method-flow .step-box{padding:10px 12px;min-width:80px}
    .tool-flow{gap:4px}.tool-flow .tool{padding:6px 10px;min-width:50px}
    .cmp-table{width:96%}.hud{padding:10px 16px 14px}.summary-items{width:92%}
    .struct-grid .sg{min-width:70px;padding:6px 8px}.chapter-sections .sec{min-width:80px}
  }
  .kb-hint{position:absolute;top:20px;right:28px;z-index:5;font-size:10px;color:rgba(255,255,255,0.12);letter-spacing:0.5px}
  .loading{
    position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;
    justify-content:center;align-items:center;background:#070c17;
    transition:opacity 0.6s ease;
  }
  .loading.hidden{opacity:0;pointer-events:none}
  .loading .spinner{width:24px;height:24px;border:2px solid rgba(255,255,255,0.08);border-top-color:#4a9eff;border-radius:50%;animation:spin 0.8s linear infinite}
  .loading .lt{font-size:12px;color:rgba(255,255,255,0.25);margin-top:12px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="player" id="player">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="lt">加载中</div>
  </div>
  <div class="part-label" id="partLabel">❖ 全书预览</div>
  <div class="kb-hint">← → 切换</div>
  <div class="slides" id="slides"></div>
  <div class="hud">
    <div class="progress-track" id="progressTrack">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="hud-row">
      <div class="hud-part" id="hudDots">
        <span class="dot" data-idx="0"></span>
        <span style="color:rgba(255,255,255,0.15)">·</span>
        <span class="dot" data-idx="1"></span>
        <span style="color:rgba(255,255,255,0.15)">·</span>
        <span class="dot" data-idx="2"></span>
      </div>
      <div class="hud-btns">
        <button id="btnPlay">▶</button>
        <button id="btnFull">⛶</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';
  const P=document.getElementById('player'),S=document.getElementById('slides');
  const PF=document.getElementById('progressFill'),PT=document.getElementById('progressTrack');
  const PL=document.getElementById('partLabel'),HD=document.getElementById('hudDots');
  const BP=document.getElementById('btnPlay'),BF=document.getElementById('btnFull'),LO=document.getElementById('loading');
  let idx=0,playing=true,timer=null,startTime=0,canvasInt=null;
  const dots=HD.querySelectorAll('.dot'),TOTAL=15;
  const parts=[{label:'❖ 全书预览',dots:0},{label:'◆ 技术流程',dots:1},{label:'■ 第1章详解',dots:2}];
  const DUR=[7000,9000,8000,9000,8000,9000,9000,8000,8000,8000,7000,8000,9000,9000,8000];

  function buildSlides(){
    const h=[];
    // Slide 0: Title
    h.push('<div class="slide" data-idx="0"><div style="text-align:center"><div class="fade-up d1" style="font-size:clamp(12px,1.2vw,16px);color:rgba(255,255,255,0.25);letter-spacing:4px;margin-bottom:16px">Siemens EDA 3D-IC 全流程设计</div><h1 class="fade-up d2">EDA封装验证实战</h1><div class="fade-up d3" style="font-size:clamp(14px,1.8vw,24px);color:rgba(255,255,255,0.6);margin-top:12px;letter-spacing:1px">Innovator3D IC + <span class="accent">Calibre</span> 通用验证平台</div><div class="glow-line fade-up d4"></div><div class="sub fade-up d5" style="margin-top:20px">2.5D / 3D-IC 全流程设计</div><div class="sub2 fade-up d6">覆盖 12 大模块 · 跨系统工具链 · 双向协同</div><div class="tagline fade-up d7">模块分解 → 独立研究 → 跨模块双向集成</div></div></div>');
    // Slide 1: 12 Modules
    const mods=[{n:'Innovator3D IC',d:'3D-IC 集成中枢'},{n:'Aprisa',d:'数字实现'},{n:'Xpedition',d:'封装基板设计'},{n:'Calibre 3DSTACK',d:'Chiplet DRC/LVS'},{n:'Questa',d:'功能验证'},{n:'AFS',d:'混合信号仿真'},{n:'HyperLynx',d:'SI/PI 仿真'},{n:'Calibre 3DThermal',d:'热分析'},{n:'NX',d:'机电热协同'},{n:'Tessent',d:'DFT/测试'},{n:'Valor',d:'DFM 验证'},{n:'Flotherm',d:'系统级热仿真'}];
    h.push('<div class="slide" data-idx="1"><div style="text-align:center"><h2 class="fade-up d1">覆盖 <span class="accent">12</span> 大 EDA 模块</h2><div class="sub fade-up d2">完整 Siemens EDA 3D-IC 工具链</div><div class="module-grid">');
    mods.forEach((m,i)=>h.push(`<div class="mod fade-up d${Math.min(i+3,10)}"><div class="mn">${m.n}</div><div class="md">${m.d}</div></div>`));
    h.push('</div></div></div>');
    // Slide 2: Core Methodology
    h.push('<div class="slide" data-idx="2"><div style="text-align:center"><h2 class="fade-up d1">核心方法论</h2><div class="sub fade-up d2">贯穿全书的学习路径</div><div class="method-flow"><div class="step-box fade-up d3"><div class="sn">STEP 1</div><div class="sc">模块分解</div></div><div class="arrow fade-up d4">→</div><div class="step-box fade-up d5"><div class="sn">STEP 2</div><div class="sc">独立研究</div></div><div class="arrow fade-up d6">→</div><div class="step-box fade-up d7"><div class="sn">STEP 3</div><div class="sc">跨模块双向集成</div></div></div><div class="glow-line" style="margin-top:20px"></div><div class="sub2 fade-up d8" style="margin-top:18px;max-width:600px">每个工具独立深入 → 理解其上下游接口 → 实现全流程贯通</div></div></div>');
    // Slide 3: Book Structure
    const pbs=[{n:'基础篇',c:'3章',t:'平台总览·数据流·规则体系'},{n:'设计实现',c:'3模块',t:'Innovator·Aprisa·Xpedition'},{n:'验证仿真',c:'5模块',t:'Calibre·Questa·AFS·HyperLynx·3DThermal'},{n:'协同制造',c:'3模块',t:'NX·Tessent·Valor'},{n:'跨模块协同',c:'2章',t:'数据协同·自动化平台'},{n:'实战案例',c:'4项目',t:'2.5D·3D Stack·异构集成·对比'},{n:'经验数据',c:'3章',t:'避坑·参数·脚本库'}];
    h.push('<div class="slide" data-idx="3"><div style="text-align:center;width:100%"><h2 class="fade-up d1">全书结构 · <span class="accent">7 篇 27 章</span></h2><div class="struct-grid">');
    pbs.forEach((p,i)=>h.push(`<div class="sg fade-up d${Math.min(i+2,9)}"><div class="sn">${p.n}</div><div class="st">${p.c}</div><div class="sc">${p.t}</div></div>`));
    h.push('</div><div class="glow-line" style="margin-top:18px"></div><div class="sub2 fade-up d9" style="margin-top:14px">+ 6 附录 · 工具速查 · Layer Map 模板 · 术语对照 · 推荐资源</div></div></div>');
    // Slide 4: Chapter structure
    h.push('<div class="slide" data-idx="4"><div style="text-align:center"><h2 class="fade-up d1">每章标准结构</h2><div class="sub fade-up d2">正文 → 避坑 → 数据 → 实战 → 经验</div><div class="struct-grid" style="margin-top:14px;max-width:500px"><div class="sg active fade-up d3"><div class="sn">正文</div><div class="st">📖 原理与方法</div><div class="sc">系统化知识</div></div><div class="sg fade-up d4"><div class="sn">避坑</div><div class="st">⚠️ 常见问题</div><div class="sc">实战经验</div></div><div class="sg highlight fade-up d5"><div class="sn">数据</div><div class="st">📊 真实参数</div><div class="sc">工程参考</div></div><div class="sg fade-up d6"><div class="sn">实战</div><div class="st">🔧 案例演示</div><div class="sc">动手实践</div></div><div class="sg active fade-up d7"><div class="sn">经验</div><div class="st">💡 总结提炼</div><div class="sc">能力内化</div></div></div><div class="glow-line" style="margin-top:16px"></div><div style="display:flex;gap:12px;justify-content:center;margin-top:14px;flex-wrap:wrap"><div class="fade-up d8" style="font-size:clamp(10px,0.9vw,12px);color:rgba(255,255,255,0.35);background:rgba(255,255,255,0.04);padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.06)">📘 约 530 页 · 全彩印刷</div><div class="fade-up d9" style="font-size:clamp(10px,0.9vw,12px);color:rgba(255,255,255,0.35);background:rgba(255,255,255,0.04);padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.06)">🔄 国内项目实战经验</div></div></div></div>');
    // Slide 5: 2.5D Cross-section (canvas)
    h.push('<div class="slide" data-idx="5"><div class="canvas-wrap" id="canvasWrap5"><canvas id="canvas5"></canvas></div></div>');
    // Slide 6: Design Data Flow
    const t1=[{n:'Innovator3D IC',d:'3D架构定义',c:'design'},{n:'Aprisa',d:'数字实现',c:'design'},{n:'Xpedition',d:'基板设计',c:'design'}];
    const t2=[{n:'Calibre 3DSTACK',d:'DRC/LVS/Signoff',c:'verify'},{n:'Calibre xACT',d:'RC提取',c:'verify'},{n:'Questa',d:'功能验证',c:'sim'},{n:'AFS',d:'混合信号仿真',c:'sim'}];
    const t3=[{n:'Calibre 3DThermal',d:'热仿真',c:'co'},{n:'NX',d:'机电热协同',c:'co'},{n:'Tessent',d:'DFT/测试',c:'co'}];
    h.push('<div class="slide" data-idx="6"><div style="text-align:center;width:100%"><h2 class="fade-up d1">设计 → 验证 → 协同 <span class="accent">数据流</span></h2><div class="sub fade-up d2">从 Chiplet 到 Signoff 的完整路径</div><div style="margin-top:16px"><div class="tool-flow">');
    t1.forEach((t,i)=>h.push(`<div class="tool ${t.c} fade-up d${i+3}"><div class="tn">${t.n}</div><div class="td">${t.d}</div></div>`));
    h.push('</div><div class="tool-flow" style="margin-top:4px"><span class="arrow-sm">↓</span></div><div class="tool-flow">');
    t2.forEach((t,i)=>h.push(`<div class="tool ${t.c} fade-up d${i+4}"><div class="tn">${t.n}</div><div class="td">${t.d}</div></div>`));
    h.push('</div><div class="tool-flow" style="margin-top:4px"><span class="arrow-sm">↓</span></div><div class="tool-flow">');
    t3.forEach((t,i)=>h.push(`<div class="tool ${t.c} fade-up d${i+6}"><div class="tn">${t.n}</div><div class="td">${t.d}</div></div>`));

  // ── Canvas rendering ──
  function renderCrossSection(){
    const el=document.getElementById('canvas5');
    if(!el) return;
    const wrap=document.getElementById('canvasWrap5');
    const W=wrap.clientWidth,H=wrap.clientHeight;
    const dpr=window.devicePixelRatio||1;
    el.width=W*dpr;el.height=H*dpr;el.style.width=W+'px';el.style.height=H+'px';
    const ctx=el.getContext('2d');ctx.scale(dpr,dpr);
    const grad=ctx.createRadialGradient(W*0.4,H*0.3,0,W*0.4,H*0.3,W*0.8);
    grad.addColorStop(0,'#0e1a30');grad.addColorStop(1,'#070c17');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    const cx=W/2;
    const s=Math.min(W,H)/680;
    const t=Math.min((Date.now()-startTime)/3000,1);
    const ease=t<0.5?2*t*t:-1+(4-2*t)*t;
    const layers=[
      {label:'Chiplet / Die',h:60*s,color:'rgba(74,158,255,0.25)',border:'rgba(74,158,255,0.4)'},
      {label:'Micro Bump',h:16*s,color:'rgba(240,180,41,0.2)',border:'rgba(240,180,41,0.35)'},
      {label:'Interposer (含 TSV)',h:90*s,color:'rgba(34,197,94,0.15)',border:'rgba(34,197,94,0.3)'},
      {label:'C4 Bump',h:18*s,color:'rgba(240,180,41,0.2)',border:'rgba(240,180,41,0.35)'},
      {label:'Substrate',h:80*s,color:'rgba(168,85,247,0.12)',border:'rgba(168,85,247,0.25)'},
      {label:'BGA Ball',h:22*s,color:'rgba(255,255,255,0.08)',border:'rgba(255,255,255,0.15)'}
    ];
    const totalH=layers.reduce((a,l)=>a+l.h,0);
    let yy=(H-totalH)/2;
    const visibleLayers=Math.ceil(ease*layers.length);
    const layerT=(ease*layers.length)%1;
    layers.forEach((l,i)=>{
      l.y0=yy;
      const show=i<visibleLayers-1?1:i===visibleLayers-1?layerT:0;
      if(show<=0)return;
      const w=400*s,x=cx-w/2,h=l.h*show,y=l.y0+l.h*(1-show);
      ctx.fillStyle=l.color;ctx.beginPath();ctx.roundRect(x,y,w,h,4);ctx.fill();
      ctx.strokeStyle=l.border;ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(x,y,w,h,4);ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font=14*s+'px "PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(l.label,x+14*s,y+h/2);
      yy+=l.h;
    });
    // TSVs
    if(visibleLayers>2){
      const ip=layers[2],ipShow=Math.min(1,visibleLayers>2?(visibleLayers>3?1:layerT):0);
      if(ipShow>0){
        const w=400*s,x=cx-w/2;
        [-120*s,-60*s,0,60*s,120*s].forEach(tx=>{
          const tH=ip.h*ipShow-20*s,tY=ip.y0+10*s;
          ctx.fillStyle='rgba(100,180,255,0.2)';ctx.beginPath();ctx.roundRect(cx+tx-4*s,tY,8*s,tH,2);ctx.fill();
          ctx.strokeStyle='rgba(100,180,255,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(cx+tx-4*s,tY,8*s,tH,2);ctx.stroke();
        });
        ctx.fillStyle='rgba(100,180,255,0.4)';ctx.font=10*s+'px "PingFang SC","Microsoft YaHei",sans-serif';
        ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText('TSV 硅通孔',cx,ip.y0+ip.h*ipShow-2*s);
      }
    }
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font=16*s+'px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('2.5D 封装结构截面',cx,16*s);
  }

  // ── Slide Manager ──
  function showSlide(i,dir){
    const prev=S.querySelector('.slide.active');
    const next=S.children[i];
    if(!next)return;
    if(prev){prev.classList.remove('active');prev.classList.add('exit');}
    next.classList.remove('exit');next.classList.add('active');
    idx=i;
    const pIdx=i<5?0:i<10?1:2;
    dots.forEach((d,di)=>{d.className='dot'+(di<pIdx?' done':di===pIdx?' active':'')});
    PL.textContent=parts[pIdx].label;
    PF.style.transition='none';PF.style.width='0%';
    setTimeout(()=>{PF.style.transition='width '+DUR[i]+'ms linear';PF.style.width='100%';},50);
    if(canvasInt){clearInterval(canvasInt);canvasInt=null;}
    if(i===5){startTime=Date.now();renderCrossSection();canvasInt=setInterval(renderCrossSection,50);}
  }

  function nextSlide(){
    const nxt=(idx+1)%TOTAL;
    showSlide(nxt,1);
    resetTimer();
  }

  function prevSlide(){
    if(idx>0){showSlide(idx-1,-1);resetTimer();}
  }

  function resetTimer(){
    if(timer){clearTimeout(timer);timer=null;}
    if(playing) timer=setTimeout(nextSlide,DUR[idx]);
  }

  buildSlides();
  setTimeout(()=>{LO.classList.add('hidden');showSlide(0,1);resetTimer();},800);

  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nextSlide();}
    if(e.key==='ArrowLeft'){e.preventDefault();prevSlide();}
  });
  PT.addEventListener('click',e=>{
    const go=Math.round((e.offsetX/PT.offsetWidth)*(TOTAL-1));
    showSlide(go,1);resetTimer();
  });
  BP.addEventListener('click',()=>{
    playing=!playing;BP.textContent=playing?'⏸':'▶';
    if(playing) resetTimer();else if(timer){clearTimeout(timer);timer=null;}
  });
  BF.addEventListener('click',()=>{
    if(!document.fullscreenElement)P.requestFullscreen?.();
    else document.exitFullscreen?.();
  });
  window.addEventListener('resize',()=>{if(idx===5){startTime=Date.now();renderCrossSection();}});
  if(!CanvasRenderingContext2D.prototype.roundRect){
    CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
      r=Math.min(r,w/2,h/2)||0;this.moveTo(x+r,y);
      this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);
      this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r);
    };
  }
})();
