<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiP Package · Thermal Simulation</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#080a0e;overflow:hidden;font-family:'SF Mono','JetBrains Mono','Courier New',monospace;cursor:default}
  canvas{display:block;width:100vw;height:100vh}

  #overlay{position:fixed;inset:0;pointer-events:none;z-index:10}
  #title{position:absolute;top:28px;left:40px;color:rgba(255,255,255,0.85);font-size:13px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase}
  #title sup{font-size:9px;opacity:0.5;margin-left:5px;font-weight:400;letter-spacing:1px}
  #subtitle{position:absolute;top:51px;left:40px;color:rgba(255,255,255,0.3);font-size:10px;letter-spacing:1.8px}
  #info{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.15);font-size:9px;letter-spacing:3px;white-space:nowrap}
  #info span{opacity:0.5}#info em{font-style:normal;color:rgba(255,255,255,0.08)}

  #legend{position:absolute;right:36px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0;transition:opacity 1.2s ease}
  #legend.visible{opacity:1}
  #legend-bar{width:14px;height:240px;border-radius:2px;position:relative;overflow:hidden}
  #legend-bar canvas{width:100%!important;height:100%!important;display:block}
  .legend-label{color:rgba(255,255,255,0.35);font-size:9px;letter-spacing:1px;line-height:1}
  .legend-label.hot{color:rgba(220,80,60,0.7)}
  .legend-label.cold{color:rgba(60,150,220,0.7)}

  #timer{position:absolute;bottom:36px;right:40px;color:rgba(255,255,255,0.12);font-size:10px;letter-spacing:1.5px;font-variant-numeric:tabular-nums}
  #fps-counter{position:absolute;bottom:36px;left:40px;color:rgba(255,255,255,0.08);font-size:9px;letter-spacing:1px}

  #label-container{position:absolute;inset:0;pointer-events:none}
  .label-3d{color:rgba(255,255,255,0.25);font-size:9px;letter-spacing:1.2px;text-transform:uppercase;line-height:1.3;transition:opacity 0.8s ease}
  .label-3d .lsub{color:rgba(255,255,255,0.1);font-size:7px;letter-spacing:0.8px;display:block}

  #replay-btn{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);pointer-events:auto;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.2);padding:8px 22px;font-size:9px;letter-spacing:2px;border-radius:3px;cursor:pointer;font-family:inherit;text-transform:uppercase;transition:all 0.4s ease;opacity:0}
  #replay-btn:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.4);border-color:rgba(255,255,255,0.15)}
  #replay-btn.visible{opacity:1}
</style>
</head>
<body>

<div id="overlay">
  <div id="title">SiP Package · Thermal Simulation <sup>CFD</sup></div>
  <div id="subtitle">Transient thermal contour · Flotherm-style visualization</div>

  <div id="legend">
    <span class="legend-label hot">105&deg;C</span>
    <div id="legend-bar"><canvas id="legend-canvas" width="14" height="240"></canvas></div>
    <span class="legend-label cold">25&deg;C</span>
  </div>

  <div id="info"><span>FLOTHERM</span> <em>·</em> <span>STEADY-STATE THERMAL</span></div>
  <div id="timer"></div>
  <div id="fps-counter"></div>

  <button id="replay-btn">&#x21BB; Replay</button>
</div>

<div id="label-container"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ── colormap ──
const CMAP = [
  [0.00, 0.00, 0.01, 0.14],
  [0.08, 0.00, 0.06, 0.28],
  [0.18, 0.00, 0.18, 0.48],
  [0.28, 0.00, 0.36, 0.60],
  [0.38, 0.00, 0.56, 0.62],
  [0.48, 0.02, 0.74, 0.54],
  [0.56, 0.12, 0.84, 0.36],
  [0.64, 0.32, 0.86, 0.16],
  [0.72, 0.60, 0.80, 0.05],
  [0.80, 0.86, 0.62, 0.04],
  [0.88, 0.92, 0.34, 0.04],
  [0.94, 0.76, 0.06, 0.06],
  [1.00, 0.50, 0.01, 0.02],
];
function thermalColor(t){
  t=Math.max(0,Math.min(1,t));
  for(let i=0;i<CMAP.length-1;i++){
    if(t>=CMAP[i][0]&&t<=CMAP[i+1][0]){
      const f=(t-CMAP[i][0])/(CMAP[i+1][0]-CMAP[i][0]);
      return [
        CMAP[i][1]+f*(CMAP[i+1][1]-CMAP[i][1]),
        CMAP[i][2]+f*(CMAP[i+1][2]-CMAP[i][2]),
        CMAP[i][3]+f*(CMAP[i+1][3]-CMAP[i][3]),
      ];
    }
  }
  return [CMAP[CMAP.length-1][1],CMAP[CMAP.length-1][2],CMAP[CMAP.length-1][3]];
}

// ── scene ──
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(30,window.innerWidth/window.innerHeight,0.1,100);
camera.position.set(11,7.5,11);
camera.lookAt(0,0,0);

const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setClearColor(0x080a0e,1);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputColorSpace=THREE.SRGBColorSpace;
document.body.prepend(renderer.domElement);

const labelRenderer=new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth,window.innerHeight);
labelRenderer.domElement.style.position='fixed';
labelRenderer.domElement.style.inset='0';
labelRenderer.domElement.style.pointerEvents='none';
labelRenderer.domElement.style.zIndex='5';
document.getElementById('label-container').appendChild(labelRenderer.domElement);

// ── lighting ──
const ambient=new THREE.AmbientLight(0x334466,0.4);
scene.add(ambient);
const keyLight=new THREE.DirectionalLight(0xffeedd,3.0);
keyLight.position.set(8,15,6);
keyLight.castShadow=true;
keyLight.shadow.mapSize.width=1024;
keyLight.shadow.mapSize.height=1024;
keyLight.shadow.camera.near=0.5;
keyLight.shadow.camera.far=40;
keyLight.shadow.camera.left=-10;
keyLight.shadow.camera.right=10;
keyLight.shadow.camera.top=10;
keyLight.shadow.camera.bottom=-10;
scene.add(keyLight);
const fillLight=new THREE.DirectionalLight(0x4488ff,0.6);
fillLight.position.set(-6,4,-8);
scene.add(fillLight);
const rimLight=new THREE.DirectionalLight(0x88aaff,0.3);
rimLight.position.set(0,-5,12);
scene.add(rimLight);
const backRim=new THREE.DirectionalLight(0x6688cc,0.2);
backRim.position.set(-8,6,-10);
scene.add(backRim);
const hemi=new THREE.HemisphereLight(0x223355,0x0a0e14,0.5);
scene.add(hemi);

// ── ground ──
const groundGeo=new THREE.PlaneGeometry(30,30);
const groundMat=new THREE.MeshStandardMaterial({color:0x0a0e14,roughness:0.8,metalness:0.2});
const ground=new THREE.Mesh(groundGeo,groundMat);
ground.rotation.x=-Math.PI/2;
ground.position.y=-1.2;
ground.receiveShadow=true;
scene.add(ground);
const grid=new THREE.GridHelper(20,20,0x223355,0x112244);
grid.position.y=-1.15;
grid.material.transparent=true;
grid.material.opacity=0.20;
scene.add(grid);

// ── package model ──
const pkgGroup=new THREE.Group();
scene.add(pkgGroup);

const subMat=new THREE.MeshPhysicalMaterial({color:0x1a1f28,roughness:0.4,metalness:0.6,clearcoat:0.1});
const subGeo=new THREE.BoxGeometry(10,0.35,10);
const substrate=new THREE.Mesh(subGeo,subMat);
substrate.position.y=0;
substrate.castShadow=true;
substrate.receiveShadow=true;
pkgGroup.add(substrate);
const subEdges=new THREE.EdgesGeometry(subGeo);
const subLine=new THREE.LineSegments(subEdges,new THREE.LineBasicMaterial({color:0x334466,transparent:true,opacity:0.3}));
subLine.position.copy(substrate.position);
pkgGroup.add(subLine);

const intMat=new THREE.MeshPhysicalMaterial({color:0x222a36,roughness:0.3,metalness:0.4});
const intGeo=new THREE.BoxGeometry(8.5,0.12,8.5);
const interposer=new THREE.Mesh(intGeo,intMat);
interposer.position.y=0.235;
interposer.castShadow=true;
pkgGroup.add(interposer);

// ── dies ──
const dieMat=new THREE.MeshPhysicalMaterial({color:0x2a344a,roughness:0.25,metalness:0.5,clearcoat:0.15});
const dieDefs=[
  {x:-1.0,z:0.5,w:3.6,d:3.6,h:0.35,name:'CPU'},
  {x:2.2,z:0.6,w:2.2,d:3.4,h:0.28,name:'GPU'},
  {x:-2.5,z:2.2,w:0.7,d:1.4,h:0.18,name:'HBM1'},
  {x:-1.5,z:2.2,w:0.7,d:1.4,h:0.18,name:'HBM2'},
  {x:-0.5,z:2.2,w:0.7,d:1.4,h:0.18,name:'HBM3'},
  {x:1.5,z:-2.0,w:1.5,d:1.5,h:0.20,name:'IO Die'},
  {x:-1.5,z:-2.2,w:1.2,d:1.0,h:0.15,name:'PMIC'},
  {x:3.0,z:-1.0,w:0.8,d:0.8,h:0.14,name:'SerDes'},
  {x:-0.8,z:-0.6,w:0.6,d:0.6,h:0.14,name:'LPDDR Ctrl'},
];
for(const d of dieDefs){
  const geo=new THREE.BoxGeometry(d.w,d.h,d.d);
  const mesh=new THREE.Mesh(geo,dieMat);
  mesh.position.set(d.x,0.35+d.h/2,d.z);
  mesh.castShadow=true;
  pkgGroup.add(mesh);
  const eGeo=new THREE.EdgesGeometry(geo);
  const eMat=new THREE.LineBasicMaterial({color:0x445577,transparent:true,opacity:0.25});
  const eLine=new THREE.LineSegments(eGeo,eMat);
  eLine.position.copy(mesh.position);
  pkgGroup.add(eLine);
}

// ── BGA balls ──
const bgaMat=new THREE.MeshPhysicalMaterial({color:0xbbaa88,roughness:0.2,metalness:0.8});
const bgaGroup=new THREE.Group();
pkgGroup.add(bgaGroup);
for(let ix=-4.5;ix<=4.5;ix+=0.7){
  for(let iz=-4.5;iz<=4.5;iz+=0.7){
    const r=0.035+0.015*Math.random();
    const s=new THREE.SphereGeometry(r,8,8);
    const m=new THREE.Mesh(s,bgaMat);
    m.position.set(ix,-0.17,iz);
    bgaGroup.add(m);
  }
}

// ── thermal overlay ──
const TEX_SIZE=512;
const thermalCanvas=document.createElement('canvas');
thermalCanvas.width=TEX_SIZE;
thermalCanvas.height=TEX_SIZE;
const ctx=thermalCanvas.getContext('2d');
const imageData=ctx.createImageData(TEX_SIZE,TEX_SIZE);
const pix=imageData.data;

const tex=new THREE.CanvasTexture(thermalCanvas);
tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
tex.repeat.set(1,1);
tex.anisotropy=16;

const overlayMat=new THREE.MeshPhysicalMaterial({
  map:tex,emissiveMap:tex,emissive:new THREE.Color(1,1,1),
  emissiveIntensity:0.4,transparent:true,opacity:0.88,
  roughness:0.5,metalness:0.1,side:THREE.DoubleSide,depthWrite:false,
});
const overlayGeo=new THREE.PlaneGeometry(10,10);
const overlay=new THREE.Mesh(overlayGeo,overlayMat);
overlay.rotation.x=-Math.PI/2;
overlay.position.y=0.005;
pkgGroup.add(overlay);

// ── heat sources ──
const heatSources=[
  {x:-1.0,z:0.5,power:1.0,sigma:0.6},
  {x:2.2,z:0.6,power:0.75,sigma:0.5},
  {x:-2.5,z:2.2,power:0.4,sigma:0.35},
  {x:-1.5,z:2.2,power:0.4,sigma:0.35},
  {x:-0.5,z:2.2,power:0.4,sigma:0.35},
  {x:1.5,z:-2.0,power:0.45,sigma:0.35},
  {x:-1.5,z:-2.2,power:0.25,sigma:0.25},
  {x:3.0,z:-1.0,power:0.2,sigma:0.25},
  {x:-0.8,z:-0.6,power:0.3,sigma:0.25},
];

// ── thermal field computation ──
let contourData=null;

function computeTemperatureField(time){
  const spread=0.6+time*0.25;
  const invSize=2/TEX_SIZE;
  const half=1;
  let maxT=0;
  const temp=new Float32Array(TEX_SIZE*TEX_SIZE);
  for(let iy=0;iy<TEX_SIZE;iy++){
    const pz=half-iy*invSize;
    for(let ix=0;ix<TEX_SIZE;ix++){
      const px=-half+ix*invSize;
      let t=0;
      for(const hs of heatSources){
        const dx=px-hs.x*0.1;
        const dz=pz-hs.z*0.1;
        const d2=dx*dx+dz*dz;
        const s=hs.sigma*spread;
        t+=hs.power*Math.exp(-d2/(2*s*s));
      }
      temp[iy*TEX_SIZE+ix]=t;
      if(t>maxT)maxT=t;
    }
  }
  const invMax=maxT>1e-10?1/maxT:1;
  const nLevels=10;
  const contourLevels=[];
  for(let i=0;i<=nLevels;i++)contourLevels.push(i/nLevels);
  const contourSegments=[];

  for(let iy=0;iy<TEX_SIZE;iy++){
    for(let ix=0;ix<TEX_SIZE;ix++){
      const t=temp[iy*TEX_SIZE+ix]*invMax;
      const idx=(iy*TEX_SIZE+ix)*4;
      const [r,g,b]=thermalColor(t);
      pix[idx]=Math.round(r*255);
      pix[idx+1]=Math.round(g*255);
      pix[idx+2]=Math.round(b*255);
      pix[idx+3]=220;
    }
  }

  // marching squares contour lines
  for(let lv=1;lv<contourLevels.length-1;lv++){
    const level=contourLevels[lv];
    for(let iy=0;iy<TEX_SIZE-1;iy++){
      for(let ix=0;ix<TEX_SIZE-1;ix++){
        const v00=temp[iy*TEX_SIZE+ix]*invMax;
        const v10=temp[iy*TEX_SIZE+ix+1]*invMax;
        const v01=temp[(iy+1)*TEX_SIZE+ix]*invMax;
        const v11=temp[(iy+1)*TEX_SIZE+ix+1]*invMax;
        const b00=v00>level?1:0;
        const b10=v10>level?1:0;
        const b01=v01>level?1:0;
        const b11=v11>level?1:0;
        const code=b00|(b10<<1)|(b11<<2)|(b01<<3);
        if(code===0||code===15)continue;
        const x0=ix,x1=ix+1,y0=iy,y1=iy+1;
        const lerp=(a,b,va,vb,val)=>{const d=vb-va;return Math.abs(d)<1e-10?0.5:(val-va)/d;};
        const edges=[];
        if((b00^b10)===1){const t=lerp(0,1,v00,v10,level);edges.push([x0+t,y0]);}
        if((b10^b11)===1){const t=lerp(0,1,v10,v11,level);edges.push([x1,y0+t]);}
        if((b01^b11)===1){const t=lerp(0,1,v01,v11,level);edges.push([x0+t,y1]);}
        if((b00^b01)===1){const t=lerp(0,1,v00,v01,level);edges.push([x0,y0+t]);}
        if(edges.length>=2){
          const lvt=lv/contourLevels.length;
          contourSegments.push({x1:edges[0][0],y1:edges[0][1],x2:edges[1][0],y2:edges[1][1],level:lvt});
        }
      }
    }
  }

  ctx.putImageData(imageData,0,0);
  ctx.save();
  for(const seg of contourSegments){
    const lvt=seg.level;
    let alpha=0.55;
    if(lvt>0.8)alpha=0.55*(1-(lvt-0.8)/0.2);
    ctx.strokeStyle=`rgba(255,255,255,${alpha*0.7})`;
    ctx.lineWidth=0.5+0.5*(1-lvt);
    ctx.beginPath();
    ctx.moveTo(seg.x1,seg.y1);
    ctx.lineTo(seg.x2,seg.y2);
    ctx.stroke();
  }
  ctx.restore();
  tex.needsUpdate=true;
}

// ── legend ──
function drawLegend(){
  const lc=document.getElementById('legend-canvas');
  const lctx=lc.getContext('2d');
  for(let i=0;i<lc.height;i++){
    const t=1-i/lc.height;
    const [r,g,b]=thermalColor(t);
    lctx.fillStyle=`rgb(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)})`;
    lctx.fillRect(0,i,lc.width,1);
  }
}
drawLegend();

// ── 3D labels ──
for(const d of dieDefs){
  const div=document.createElement('div');
  div.className='label-3d';
  div.textContent=d.name;
  div.style.opacity='0';
  const label=new CSS2DObject(div);
  label.position.set(d.x,0.35+d.h+0.15,d.z);
  pkgGroup.add(label);
}

// ── camera animation ──
const CAM_DURATION=18;
const cameraStart=new THREE.Vector3(11,7.5,11);
const cameraEnd=new THREE.Vector3(3.2,2.0,3.2);

// ── state ──
let elapsed=0;
let running=true;
let lastTime=0;

document.getElementById('replay-btn').addEventListener('click',()=>{
  elapsed=0;
  running=true;
  document.getElementById('replay-btn').classList.remove('visible');
  document.getElementById('legend').classList.remove('visible');
  document.querySelectorAll('.label-3d').forEach(el=>el.style.opacity='0');
});

// ── loop ──
function animate(time){
  if(!running){requestAnimationFrame(animate);return;}
  const dt=lastTime?Math.min((time-lastTime)/1000,0.05):0.016;
  lastTime=time;
  elapsed+=dt;
  if(elapsed>CAM_DURATION+4){
    running=false;
    document.getElementById('replay-btn').classList.add('visible');
    requestAnimationFrame(animate);
    return;
  }
  const p=Math.min(elapsed/CAM_DURATION,1);
  const ep=p<0.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
  const cp=new THREE.Vector3().lerpVectors(cameraStart,cameraEnd,ep);
  camera.position.copy(cp);
  camera.lookAt(0,0,0);

  const heatTime=Math.min(elapsed,6);
  computeTemperatureField(heatTime);

  if(elapsed>0.8)document.getElementById('legend').classList.add('visible');
  if(elapsed>1.5&&elapsed<3.0){
    const lp=(elapsed-1.5)/1.5;
    document.querySelectorAll('.label-3d').forEach(el=>el.style.opacity=String(lp));
  }
  overlayMat.emissiveIntensity=0.3+0.3*p;

  document.getElementById('timer').textContent=`t = ${elapsed.toFixed(1)}s`;
  renderer.render(scene,camera);
  labelRenderer.render(scene,camera);
  requestAnimationFrame(animate);
}

window.addEventListener('resize',()=>{
  const w=window.innerWidth,h=window.innerHeight;
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
  renderer.setSize(w,h);
  labelRenderer.setSize(w,h);
});

requestAnimationFrame(animate);
</script>
</body>
</html>
