<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chiplet 布局 · 手绘</title>
<style>
  body{ margin:0; background:#f5f0e8; display:flex; justify-content:center; min-height:100vh; }
  .container{ max-width:720px; width:100%; padding:16px; }
  h1{ text-align:center; font-size:22px; color:#2c2c2c; margin:0 0 2px; font-family:'PingFang SC','Microsoft YaHei',sans-serif; letter-spacing:2px; }
  .sub{ text-align:center; font-size:11px; color:#8b7b6f; margin-bottom:10px; font-family:'PingFang SC','Microsoft YaHei',sans-serif; }
  canvas{ width:100%; display:block; border-radius:4px; }
</style>
</head>
<body>
<div class="container">
  <h1>Chiplet 布局架构图</h1>
  <p class="sub">UCIe Die-to-Die 互连 · 多 Chiplet 异构集成</p>
  <canvas id="c"></canvas>
</div>
<script>
(function(){
  const c=document.getElementById('c'),W=700,H=620,dpr=window.devicePixelRatio||1;
  c.width=W*dpr;c.height=H*dpr;c.style.width=W+'px';c.style.height=H+'px';
  const ctx=c.getContext('2d');ctx.scale(dpr,dpr);
  ctx.fillStyle='#f5f0e8';ctx.fillRect(0,0,W,H);
  function R(n){return(Math.random()-0.5)*n}

  function sketchLine(x1,y1,x2,y2,o){
    for(let d=0;d<2;d++){
      ctx.strokeStyle=d===0?o.c||'#333':'rgba(50,50,50,0.25)';
      ctx.lineWidth=d===0?(o.w||1.5):(o.w||1.5)*0.5;
      ctx.beginPath();
      const n=5;
      for(let i=0;i<=n;i++){
        const t=i/n,w=(i>0&&i<n)?R(o.r||1.8):0;
        i===0?ctx.moveTo(x1+(x2-x1)*t+w+R(d),y1+(y2-y1)*t+w+R(d)):ctx.lineTo(x1+(x2-x1)*t+w+R(d),y1+(y2-y1)*t+w+R(d));
      }
      ctx.stroke();
    }
  }

  function sketchRect(x,y,w,h,o){
    const r=o.r||2;
    sketchLine(x+3,y+3,x+w+3,y+3,{c:'rgba(0,0,0,0.04)',w:1,r:1});
    sketchLine(x+w+3,y+3,x+w+3,y+h+3,{c:'rgba(0,0,0,0.04)',w:1,r:1});
    sketchLine(x+w+3,y+h+3,x+3,y+h+3,{c:'rgba(0,0,0,0.04)',w:1,r:1});
    sketchLine(x+3,y+h+3,x+3,y+3,{c:'rgba(0,0,0,0.04)',w:1,r:1});
    sketchLine(x,y,x+w,y,o); sketchLine(x+w,y,x+w,y+h,o);
    sketchLine(x+w,y+h,x,y+h,o); sketchLine(x,y+h,x,y,o);
    if(o.fill){ctx.fillStyle=o.fill;ctx.fillRect(x+2,y+2,w-4,h-4);
      ctx.strokeStyle='rgba(0,0,0,0.05)';ctx.lineWidth=0.5;
      for(let i=1;i<w-6;i+=12){ctx.beginPath();ctx.moveTo(x+4+i+R(3),y+4+R(2));ctx.lineTo(x+4+i+R(3),y+h-4+R(2));ctx.stroke();}
      for(let i=1;i<h-6;i+=12){ctx.beginPath();ctx.moveTo(x+4+R(2),y+4+i+R(3));ctx.lineTo(x+w-4+R(2),y+4+i+R(3));ctx.stroke();}
    }
  }

  function txt(s,x,y,o){
    ctx.fillStyle=o.c||'#222';
    ctx.font=(o.b?'bold ':'')+(o.sz||12)+'px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign=o.al||'center';ctx.textBaseline=o.bl||'middle';
    ctx.fillText(s,x+R(0.5),y+R(0.5));
  }

  const cx=W/2,cy=H/2+10;
  const iw=380,ih=370,ix=cx-iw/2,iy=cy-ih/2;

  // Interposer
  sketchRect(ix,iy,iw,ih,{c:'#5a4a3a',w:1.8,fill:'#e8e0d4',r:2.5});
  txt('Silicon Interposer / Base Die',cx,iy-8,{c:'#5a4a3a',sz:12});

  const g=10; // gap

  // Chiplet definitions with more space
  const chips=[];
  function C(x,y,w,h,label,sub,color){
    chips.push({x:ix+x,y:iy+y,w,h,label,sub,color});
  }

  // Top row
  C(10,10,140,76,'Logic Core','CPU Cluster','#d4c8b8');
  C(10+140+g,10,76,76,'L3\nCache','Shared','#c8d4b8');
  C(10+140+g+76+g,10,100,76,'AI\nAccel.','NPU','#d4b8c8');

  // Mid row
  C(10,10+76+g,96,76,'I/O Die','PCIe / USB','#c8d4b8');
  C(10+96+g,10+76+g,126,76,'Interconnect','UCIe / D2D','#c8c0a8');
  C(iw-106-10,10+76+g,106,ih-10-76-g-78-g-10,'HBM3\nStack','16-Hi','#b8c8d4');

  // Bottom row
  C(10,iy+ih-78-10,76,76,'SerDes','112G','#c8c0a8');
  C(10+76+g,iy+ih-78-10,76,76,'PLL/CLK','Timing','#c8d4b8');
  C(10+76+g+76+g,iy+ih-78-10,96,76,'PHY','D2D IF','#c8c0a8');
  C(10+76+g+76+g+96+g,iy+ih-78-10,56,76,'PMIC','Power','#c8d4b8');

  // Draw chiplets
  const strokeMap={'#d4c8b8':'#5a4a3a','#c8d4b8':'#4a5a3a','#d4b8c8':'#5a3a4a','#c8c0a8':'#5a5040','#b8c8d4':'#3a5a6a'};

  chips.forEach(ch=>{
    const sc=strokeMap[ch.color]||'#4a4a4a';
    sketchRect(ch.x,ch.y,ch.w,ch.h,{c:sc,w:1.6,fill:ch.color,r:2.5});
    const lines=ch.label.split('\n');
    lines.forEach((l,i)=> txt(l,ch.x+ch.w/2,ch.y+ch.h/2-8+i*15,{c:'#222',sz:12,b:i===0}));
    if(ch.sub) txt(ch.sub,ch.x+ch.w/2,ch.y+ch.h-10,{c:'#5a5a4a',sz:10});
  });

  // Interconnect lines
  function connect(a,b,dashed){
    ctx.strokeStyle=dashed?'rgba(106,122,90,0.35)':'rgba(106,122,90,0.25)';
    ctx.lineWidth=1.2;if(dashed)ctx.setLineDash([5,5]);
    ctx.beginPath();
    const n=10,x1=a.x+a.w/2,y1=a.y+a.h/2,x2=b.x+b.w/2,y2=b.y+b.h/2;
    for(let i=0;i<=n;i++){const t=i/n;ctx.lineTo(x1+(x2-x1)*t+R(5),y1+(y2-y1)*t+R(5));}
    ctx.stroke();ctx.setLineDash([]);
  }

  // Draw connections
  for(let i=0;i<chips.length-1;i++){
    if(i===2) connect(chips[2],chips[5]); // AI -> HBM
    if(i===0) connect(chips[0],chips[1]); // Logic -> Cache
    if(i===1) connect(chips[1],chips[2]); // Cache -> AI
    if(i===3) connect(chips[3],chips[4]); // I/O -> Fabric
    if(i===4) connect(chips[4],chips[5]); // Fabric -> HBM
    if(i===6) connect(chips[6],chips[8]); // SerDes -> PHY
    if(i===8) connect(chips[8],chips[9]); // PHY -> PMIC
  }
  connect(chips[0],chips[3]); // Logic -> I/O
  connect(chips[0],chips[4],true); // Logic -> Fabric (dashed)
  connect(chips[4],chips[6]); // Fabric -> SerDes
  connect(chips[4],chips[7]); // Fabric -> PLL
  connect(chips[4],chips[8]); // Fabric -> PHY
  connect(chips[4],chips[9]); // Fabric -> PMIC

  // UCIe label
  txt('← UCIe Die-to-Die Interconnect →',chips[4].x+chips[4].w/2,chips[4].y+chips[4].h+8,{c:'#6a7a5a',sz:10});

  // Legend (top-left corner)
  const lx=12,ly=12;
  txt('图例',lx+8,ly+8,{c:'#222',sz:11,b:true,al:'left'});
  [['Logic','#d4c8b8'],['HBM','#b8c8d4'],['I/O','#c8d4b8'],['AI','#d4b8c8'],['SerDes','#c8c0a8']].forEach(([l,c],i)=>{
    const yy=ly+28+i*22;
    sketchRect(lx,yy,16,12,{c:'#4a4a4a',w:1,fill:c,r:1.5});
    txt(l,lx+22,yy+6,{c:'#333',sz:10,al:'left'});
  });

  // External I/O arrows
  const io=chips[3];
  for(let i=0;i<3;i++){
    const yy=io.y+15+i*22;
    ctx.strokeStyle='#5a5a5a';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(ix-35+R(2),yy+R(2));ctx.lineTo(ix+4+R(2),yy+R(2));ctx.stroke();
    ctx.fillStyle='#5a5a5a';
    ctx.beginPath();ctx.moveTo(ix,yy-4);ctx.lineTo(ix+5,yy);ctx.lineTo(ix,yy+4);ctx.closePath();ctx.fill();
  }
  txt('PCIe / USB →',ix-8,io.y+18,{c:'#5a5a5a',sz:10,al:'right'});
  txt('← Memory',ix+iw+8,chips[5].y+chips[5].h/2,{c:'#5a5a5a',sz:10,al:'left'});
  txt('↑ AI Data',chips[2].x+chips[2].w/2,chips[2].y-6,{c:'#5a5a5a',sz:10});
  txt('↓ 基板 / PCB',cx,iy+ih+12,{c:'#5a5a5a',sz:10});

  // Corners
  ctx.strokeStyle='rgba(74,58,46,0.1)';ctx.lineWidth=1;
  [[10,10,25],[W-10,10,-25],[10,H-10,25],[W-10,H-10,-25]].forEach(([x,y,s])=>{
    ctx.beginPath();for(let i=0;i<4;i++)ctx.lineTo(x+R(s),y+R(s/3));ctx.stroke();
  });
})();
</script>
</body>
</html>
