  .about-intro-box {
    display: flex; gap: 16px; align-items: flex-start;
    padding: 20px 24px; margin-bottom: 20px;
    background: linear-gradient(135deg, #f0f4ff, #f8faff);
    border: 1px solid var(--slate-200);
    border-radius: var(--radius-sm);
    border-left: 3px solid var(--blue-light);
  }
  .about-intro-icon { font-size: 1.6rem; flex-shrink: 0; line-height: 1; }
  .about-intro-text p { margin: 0; font-size: 0.9rem; color: var(--slate-600); line-height: 1.7; }
  .about-intro-text p strong { color: var(--slate-900); }
